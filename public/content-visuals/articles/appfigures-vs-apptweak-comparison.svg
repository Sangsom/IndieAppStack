<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Appfigures vs AppTweak</title>
  <desc id="desc">A two-column comparison showing Appfigures leading with analytics and monitoring while AppTweak leads with ASO keyword and metadata research.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .brand { font: 780 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .tag { font: 740 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .item { font: 560 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .vs { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="108" class="title">Appfigures vs AppTweak</text>
  <text x="98" y="143" class="subtitle">Same goal, different lead: understand the store, or optimize the listing.</text>

  <rect x="96" y="196" width="470" height="368" rx="26" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <text x="128" y="244" class="tag">ANALYTICS FIRST</text>
  <text x="128" y="284" class="brand">Appfigures</text>
  <text x="128" y="342" class="item">Downloads and revenue reporting</text>
  <text x="128" y="382" class="item">Rankings and review monitoring</text>
  <text x="128" y="422" class="item">Strong across a portfolio of apps</text>
  <text x="128" y="462" class="item">Keyword tracking alongside analytics</text>
  <text x="128" y="520" class="small">Best when performance over time is the job.</text>

  <rect x="634" y="196" width="470" height="368" rx="26" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <text x="666" y="244" class="tag">ASO FIRST</text>
  <text x="666" y="284" class="brand">AppTweak</text>
  <text x="666" y="342" class="item">Keyword research and difficulty</text>
  <text x="666" y="382" class="item">Metadata optimization</text>
  <text x="666" y="422" class="item">Competitor and creative analysis</text>
  <text x="666" y="462" class="item">Deep ASO focus per app</text>
  <text x="666" y="520" class="small">Best when rewriting a listing for search.</text>

  <circle cx="600" cy="380" r="34" fill="#374550"/>
  <text x="600" y="388" class="vs" text-anchor="middle">VS</text>

  <rect x="96" y="588" width="1008" height="1" fill="#dde4e8"/>
  <text x="96" y="614" class="small">Only one budget? Launch metadata: start with AppTweak. Performance over time: start with Appfigures.</text>
</svg>
