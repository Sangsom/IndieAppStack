<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">RevenueCat alternatives decision guide</title>
  <desc id="desc">A decision guide routing solo builders from RevenueCat to Adapty for paywall analytics, Superwall for remote iteration, Qonversion for a lower-percentage meter, or native StoreKit for no dependency.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1b2430" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 760 39px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #171f29; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707d; }
      .tool { font: 760 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #171f29; }
      .role { font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5c6873; letter-spacing: 0.9px; }
      .copy { font: 520 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #34424d; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #65737d; }
      .base { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="110" class="title">Pick The Alternative By Your Reason To Switch</text>
  <text x="98" y="146" class="subtitle">RevenueCat stays a reliable default. Look past it when one of these is your actual bottleneck.</text>

  <rect x="96" y="188" width="1008" height="52" rx="26" fill="#171f29"/>
  <circle cx="132" cy="214" r="10" fill="#e8bb54"/>
  <text x="156" y="220" class="base">Already on RevenueCat? Route by the job the default does not do best.</text>

  <rect x="100" y="286" width="232" height="250" rx="24" fill="#e9f4ff" stroke="#91bced" stroke-width="2"/>
  <text x="124" y="326" class="role">PAYWALL ANALYTICS</text>
  <text x="124" y="362" class="tool">Adapty</text>
  <text x="124" y="404" class="copy">Run paywall and</text>
  <text x="124" y="426" class="copy">pricing tests as a</text>
  <text x="124" y="448" class="copy">habit, next to</text>
  <text x="124" y="470" class="copy">subscription analytics.</text>

  <rect x="356" y="286" width="232" height="250" rx="24" fill="#edf7ee" stroke="#7dc58b" stroke-width="2"/>
  <text x="380" y="326" class="role">REMOTE ITERATION</text>
  <text x="380" y="362" class="tool">Superwall</text>
  <text x="380" y="404" class="copy">Change paywalls</text>
  <text x="380" y="426" class="copy">often without app</text>
  <text x="380" y="448" class="copy">releases; infra free</text>
  <text x="380" y="470" class="copy">at any scale.</text>

  <rect x="612" y="286" width="232" height="250" rx="24" fill="#fff3d8" stroke="#e8bb54" stroke-width="2"/>
  <text x="636" y="326" class="role">LOWER-% METER</text>
  <text x="636" y="362" class="tool">Qonversion</text>
  <text x="636" y="404" class="copy">Bundled SDK,</text>
  <text x="636" y="426" class="copy">paywalls, and</text>
  <text x="636" y="448" class="copy">analytics at a lower</text>
  <text x="636" y="470" class="copy">percentage meter.</text>

  <rect x="868" y="286" width="232" height="250" rx="24" fill="#eef1f4" stroke="#b9c2cb" stroke-width="2"/>
  <text x="892" y="326" class="role">NO DEPENDENCY</text>
  <text x="892" y="362" class="tool">StoreKit 2</text>
  <text x="892" y="404" class="copy">Apple's own</text>
  <text x="892" y="426" class="copy">purchase APIs,</text>
  <text x="892" y="448" class="copy">no third-party fee.</text>
  <text x="892" y="470" class="copy">You own the setup.</text>

  <rect x="100" y="568" width="1000" height="1" fill="#dfe5ea"/>
  <text x="100" y="599" class="small">Match the column to your reason for switching, then verify current pricing and features before you migrate.</text>
</svg>
