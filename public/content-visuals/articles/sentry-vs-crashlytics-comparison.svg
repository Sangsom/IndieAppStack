<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Sentry vs Firebase Crashlytics</title>
  <desc id="desc">A two-column comparison showing Sentry spanning mobile, backend, and web errors while Firebase Crashlytics focuses on mobile crashes inside the Firebase console.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .brand { font: 780 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .tag { font: 740 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .item { font: 560 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .vs { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="108" class="title">Sentry vs Firebase Crashlytics</text>
  <text x="98" y="143" class="subtitle">Both catch crashes. They differ in scope and where they live.</text>

  <rect x="96" y="196" width="470" height="368" rx="26" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <text x="128" y="244" class="tag">SPANS EVERYTHING</text>
  <text x="128" y="284" class="brand">Sentry</text>
  <text x="128" y="342" class="item">Errors across mobile, backend, web</text>
  <text x="128" y="382" class="item">Releases, tracing, session replay</text>
  <text x="128" y="422" class="item">Free Developer tier for one user</text>
  <text x="128" y="462" class="item">Vendor-neutral across platforms</text>
  <text x="128" y="520" class="small">Best when errors cross app boundaries.</text>

  <rect x="634" y="196" width="470" height="368" rx="26" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <text x="666" y="244" class="tag">MOBILE-FIRST IN FIREBASE</text>
  <text x="666" y="284" class="brand">Crashlytics</text>
  <text x="666" y="342" class="item">Realtime mobile crash reporting</text>
  <text x="666" y="382" class="item">Beside Analytics and Remote Config</text>
  <text x="666" y="422" class="item">Listed as a no-cost product</text>
  <text x="666" y="462" class="item">Tightly tied to the Google stack</text>
  <text x="666" y="520" class="small">Best when Firebase is already the center.</text>

  <circle cx="600" cy="380" r="34" fill="#374550"/>
  <text x="600" y="388" class="vs" text-anchor="middle">VS</text>

  <rect x="96" y="588" width="1008" height="1" fill="#dde4e8"/>
  <text x="96" y="614" class="small">For a first launch either works. Pick one, install it before the first external build, and wire it to release names.</text>
</svg>
