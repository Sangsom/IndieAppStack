<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">The four ASO jobs and their tools</title>
  <desc id="desc">A map of the four main app store optimization jobs, keyword research, rank and market monitoring, reviews and reputation, and store creative, each matched to tools.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .tag { font: 740 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .step { font: 760 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .copy { font: 520 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .tool { font: 720 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="108" class="title">The Four ASO Jobs</text>
  <text x="98" y="143" class="subtitle">Match the tool to the job you need done this month, not to the brand.</text>

  <rect x="96" y="196" width="488" height="176" rx="24" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <text x="124" y="238" class="tag">KEYWORD RESEARCH</text>
  <text x="124" y="278" class="step">What can rank and convert?</text>
  <text x="124" y="330" class="copy">Volume, difficulty, and intent for realistic terms.</text>
  <text x="124" y="356" class="tool">AppTweak · Appfigures</text>

  <rect x="616" y="196" width="488" height="176" rx="24" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <text x="644" y="238" class="tag">RANK + MARKET MONITORING</text>
  <text x="644" y="278" class="step">Are the numbers moving?</text>
  <text x="644" y="330" class="copy">Rankings, downloads, and revenue over time.</text>
  <text x="644" y="356" class="tool">Appfigures</text>

  <rect x="96" y="388" width="488" height="176" rx="24" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <text x="124" y="430" class="tag">REVIEWS + REPUTATION</text>
  <text x="124" y="470" class="step">What are users saying?</text>
  <text x="124" y="522" class="copy">Monitor ratings, reply, and route feedback.</text>
  <text x="124" y="548" class="tool">AppFollow · Appfigures</text>

  <rect x="616" y="388" width="488" height="176" rx="24" fill="#efeaff" stroke="#b7a6ec" stroke-width="2"/>
  <text x="644" y="430" class="tag">STORE CREATIVE</text>
  <text x="644" y="470" class="step">Do screenshots explain it?</text>
  <text x="644" y="522" class="copy">Screenshots, captions, frames, and localization.</text>
  <text x="644" y="548" class="tool">AppScreens</text>

  <rect x="96" y="588" width="1008" height="1" fill="#dde4e8"/>
  <text x="96" y="614" class="small">ASO tools inform decisions. The listing copy, screenshots, and the app's promise do most of the work.</text>
</svg>
