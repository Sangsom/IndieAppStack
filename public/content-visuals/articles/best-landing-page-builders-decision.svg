<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Landing page builder decision guide</title>
  <desc id="desc">A decision guide routing a mobile app landing page choice from the page's main job to Framer, Webflow, or Kit.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="9" refY="3" viewBox="0 0 10 6">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f8d96"/>
    </marker>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .prompt { font: 720 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .step { font: 760 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .tag { font: 740 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .copy { font: 520 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="110" class="title">Choosing a Landing Page Builder</text>
  <text x="98" y="146" class="subtitle">Match the builder to the page's real job, not to which tool looks nicest.</text>

  <rect x="340" y="192" width="520" height="66" rx="20" fill="#eef2f4" stroke="#d3dde2"/>
  <text x="600" y="232" class="prompt" text-anchor="middle">What is the page's main job?</text>

  <line x1="560" y1="258" x2="258" y2="332" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="258" x2="600" y2="332" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="258" x2="942" y2="332" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="96" y="338" width="320" height="230" rx="26" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <circle cx="130" cy="378" r="9" fill="#407db9"/>
  <text x="150" y="383" class="tag">FAST + POLISHED</text>
  <text x="126" y="424" class="step">Framer</text>
  <text x="126" y="460" class="copy">Design-led launch or</text>
  <text x="126" y="484" class="copy">waitlist page, live fast.</text>
  <text x="126" y="528" class="small">Free tier; paid adds a domain.</text>

  <rect x="440" y="338" width="320" height="230" rx="26" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <circle cx="474" cy="378" r="9" fill="#2f8f63"/>
  <text x="494" y="383" class="tag">MARKETING SITE</text>
  <text x="470" y="424" class="step">Webflow</text>
  <text x="470" y="460" class="copy">CMS-backed site with</text>
  <text x="470" y="484" class="copy">posts, docs, many pages.</text>
  <text x="470" y="528" class="small">More power, steeper setup.</text>

  <rect x="784" y="338" width="320" height="230" rx="26" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <circle cx="818" cy="378" r="9" fill="#bf8430"/>
  <text x="838" y="383" class="tag">EMAIL FIRST</text>
  <text x="814" y="424" class="step">Kit</text>
  <text x="814" y="460" class="copy">Collect emails now,</text>
  <text x="814" y="484" class="copy">launch to a warm list.</text>
  <text x="814" y="528" class="small">Simple pages, strong email.</text>

  <rect x="100" y="592" width="1000" height="1" fill="#dde4e8"/>
  <text x="100" y="618" class="small">A launch page rarely fails on the builder. It fails when the promise and the call to action are vague.</text>
</svg>
