<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mobile app launch stack timeline</title>
  <desc id="desc">A four-phase launch timeline for a solo mobile app, from pre-launch page and waitlist through post-launch focus, mapped to five launch jobs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="9" refY="3" viewBox="0 0 10 6">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f8d96"/>
    </marker>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .step { font: 760 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .tag { font: 740 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .copy { font: 520 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .small { font: 520 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
      .num { font: 800 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .band { font: 740 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="108" class="title">Mobile App Launch Stack</text>
  <text x="98" y="143" class="subtitle">Five jobs, one owner each, sequenced across four launch phases.</text>

  <rect x="96" y="188" width="222" height="248" rx="24" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <circle cx="128" cy="226" r="17" fill="#2f8f63"/>
  <text x="122" y="232" class="num">1</text>
  <text x="156" y="231" class="tag">3–4 WEEKS OUT</text>
  <text x="122" y="278" class="step">Set the stage</text>
  <text x="122" y="314" class="copy">Landing page live.</text>
  <text x="122" y="338" class="copy">Waitlist capturing</text>
  <text x="122" y="362" class="copy">emails.</text>
  <text x="122" y="406" class="small">Explain + capture.</text>

  <line x1="326" y1="312" x2="350" y2="312" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="358" y="188" width="222" height="248" rx="24" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <circle cx="390" cy="226" r="17" fill="#bf8430"/>
  <text x="384" y="232" class="num">2</text>
  <text x="418" y="231" class="tag">1–2 WEEKS OUT</text>
  <text x="384" y="278" class="step">Prep the store</text>
  <text x="384" y="314" class="copy">Screenshots, title,</text>
  <text x="384" y="338" class="copy">keywords. Crash and</text>
  <text x="384" y="362" class="copy">analytics wired.</text>
  <text x="384" y="406" class="small">Look credible + observable.</text>

  <line x1="588" y1="312" x2="612" y2="312" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="620" y="188" width="222" height="248" rx="24" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <circle cx="652" cy="226" r="17" fill="#407db9"/>
  <text x="646" y="232" class="num">3</text>
  <text x="680" y="231" class="tag">LAUNCH WEEK</text>
  <text x="646" y="278" class="step">Ship and watch</text>
  <text x="646" y="314" class="copy">Announce to the list.</text>
  <text x="646" y="338" class="copy">Check crashes daily.</text>
  <text x="646" y="362" class="copy">Watch conversion.</text>
  <text x="646" y="406" class="small">Stay observable.</text>

  <line x1="850" y1="312" x2="874" y2="312" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="882" y="188" width="222" height="248" rx="24" fill="#efeaff" stroke="#b7a6ec" stroke-width="2"/>
  <circle cx="914" cy="226" r="17" fill="#6f57c4"/>
  <text x="908" y="232" class="num">4</text>
  <text x="942" y="231" class="tag">WEEKS 2–4</text>
  <text x="908" y="278" class="step">Learn and focus</text>
  <text x="908" y="314" class="copy">Compare install</text>
  <text x="908" y="338" class="copy">sources. Double</text>
  <text x="908" y="362" class="copy">down on one.</text>
  <text x="908" y="406" class="small">Keep users close.</text>

  <rect x="96" y="470" width="1008" height="86" rx="24" fill="#f8faf9" stroke="#dbe4e8"/>
  <text x="124" y="504" class="band">The five jobs:</text>
  <text x="124" y="532" class="copy">Explain the app  ·  Capture interest  ·  Look credible in the store  ·  Stay observable  ·  Keep early users close</text>

  <rect x="96" y="586" width="1008" height="1" fill="#dde4e8"/>
  <text x="96" y="612" class="small">Add channels only after the first launch shows where attention and paying users actually come from.</text>
</svg>
