<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">ASO starter workflow</title>
  <desc id="desc">A four-step ASO starter workflow for an indie app, moving from keyword research to metadata, store creative, and ongoing monitoring.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="9" refY="3" viewBox="0 0 10 6">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f8d96"/>
    </marker>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .step { font: 760 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .tag { font: 740 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .copy { font: 520 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .small { font: 520 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
      .num { font: 800 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="108" class="title">ASO Starter Workflow</text>
  <text x="98" y="143" class="subtitle">Four jobs, in order, before you spend on acquisition.</text>

  <rect x="96" y="196" width="222" height="252" rx="24" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <circle cx="128" cy="234" r="17" fill="#407db9"/>
  <text x="122" y="240" class="num">1</text>
  <text x="156" y="239" class="tag">RESEARCH</text>
  <text x="122" y="286" class="step">Keywords</text>
  <text x="122" y="322" class="copy">List real search</text>
  <text x="122" y="346" class="copy">terms. Check volume</text>
  <text x="122" y="370" class="copy">and difficulty.</text>
  <text x="122" y="414" class="small">AppTweak · Appfigures</text>

  <line x1="326" y1="322" x2="350" y2="322" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="358" y="196" width="222" height="252" rx="24" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <circle cx="390" cy="234" r="17" fill="#2f8f63"/>
  <text x="384" y="240" class="num">2</text>
  <text x="418" y="239" class="tag">METADATA</text>
  <text x="384" y="286" class="step">Store fields</text>
  <text x="384" y="322" class="copy">Optimize the title,</text>
  <text x="384" y="346" class="copy">subtitle, and keyword</text>
  <text x="384" y="370" class="copy">field the stores index.</text>
  <text x="384" y="414" class="small">Confirm rules per store.</text>

  <line x1="588" y1="322" x2="612" y2="322" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="620" y="196" width="222" height="252" rx="24" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <circle cx="652" cy="234" r="17" fill="#bf8430"/>
  <text x="646" y="240" class="num">3</text>
  <text x="680" y="239" class="tag">CREATIVE</text>
  <text x="646" y="286" class="step">Screenshots</text>
  <text x="646" y="322" class="copy">First two frames</text>
  <text x="646" y="346" class="copy">explain the app,</text>
  <text x="646" y="370" class="copy">then show detail.</text>
  <text x="646" y="414" class="small">AppScreens</text>

  <line x1="850" y1="322" x2="874" y2="322" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="882" y="196" width="222" height="252" rx="24" fill="#efeaff" stroke="#b7a6ec" stroke-width="2"/>
  <circle cx="914" cy="234" r="17" fill="#6f57c4"/>
  <text x="908" y="240" class="num">4</text>
  <text x="942" y="239" class="tag">MONITOR</text>
  <text x="908" y="286" class="step">Reviews + ranks</text>
  <text x="908" y="322" class="copy">Watch movement.</text>
  <text x="908" y="346" class="copy">Change one thing</text>
  <text x="908" y="370" class="copy">at a time.</text>
  <text x="908" y="414" class="small">AppFollow · Appfigures</text>

  <rect x="96" y="486" width="1008" height="1" fill="#dde4e8"/>
  <text x="96" y="512" class="small">Do these before spending on acquisition. Paid traffic magnifies a weak listing instead of fixing it.</text>
  <text x="96" y="560" class="copy">Cadence: re-check keywords, screenshots, and review language monthly while the app is still learning what converts.</text>
</svg>
