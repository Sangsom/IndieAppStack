<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Privacy-friendly analytics starter event map</title>
  <desc id="desc">A small starter analytics taxonomy for a mobile app, moving from activation through engagement, paywall intent, conversion, and retention.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerHeight="11" markerWidth="11" orient="auto" refX="9" refY="3" viewBox="0 0 10 6">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f8d96"/>
    </marker>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .tag { font: 740 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .code { font: 640 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #17202a; }
      .small { font: 520 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
      .band { font: 740 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="108" class="title">A Starter Analytics Event Map</text>
  <text x="98" y="143" class="subtitle">Seven events, each tied to a decision. Privacy-friendly and anonymized by default.</text>

  <rect x="96" y="210" width="176" height="210" rx="22" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <text x="116" y="252" class="tag">ACTIVATION</text>
  <text x="116" y="296" class="code">onboarding_</text>
  <text x="116" y="318" class="code">completed</text>
  <text x="116" y="360" class="small">Reached first value.</text>

  <line x1="280" y1="315" x2="296" y2="315" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="304" y="210" width="176" height="210" rx="22" fill="#e7f4f2" stroke="#74bfb8" stroke-width="2"/>
  <text x="324" y="252" class="tag">ENGAGEMENT</text>
  <text x="324" y="296" class="code">core_feature_</text>
  <text x="324" y="318" class="code">used</text>
  <text x="324" y="360" class="small">Did the main job.</text>

  <line x1="488" y1="315" x2="504" y2="315" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="512" y="210" width="176" height="210" rx="22" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <text x="532" y="252" class="tag">INTENT</text>
  <text x="532" y="296" class="code">paywall_</text>
  <text x="532" y="318" class="code">viewed</text>
  <text x="532" y="360" class="small">Saw the offer.</text>

  <line x1="696" y1="315" x2="712" y2="315" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="720" y="210" width="176" height="210" rx="22" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <text x="740" y="252" class="tag">CONVERSION</text>
  <text x="740" y="296" class="code">purchase_</text>
  <text x="740" y="318" class="code">completed</text>
  <text x="740" y="360" class="small">Started paying.</text>

  <line x1="904" y1="315" x2="920" y2="315" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="928" y="210" width="176" height="210" rx="22" fill="#efeaff" stroke="#b7a6ec" stroke-width="2"/>
  <text x="948" y="252" class="tag">RETENTION</text>
  <text x="948" y="296" class="code">subscription_</text>
  <text x="948" y="318" class="code">status_changed</text>
  <text x="948" y="360" class="small">Stayed or churned.</text>

  <rect x="96" y="470" width="1008" height="80" rx="24" fill="#f8faf9" stroke="#dbe4e8"/>
  <text x="124" y="504" class="band">Also worth tracking:</text>
  <text x="124" y="532" class="small">purchase_started (checkout funnel) and restore_attempted (support and reinstall friction).</text>

  <rect x="96" y="580" width="1008" height="1" fill="#dde4e8"/>
  <text x="96" y="606" class="small">Measure what changes a decision. If an event never moves a choice, delete it.</text>
</svg>
