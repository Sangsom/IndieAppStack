<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mixpanel vs Amplitude comparison graphic</title>
  <desc id="desc">A two-column decision graphic contrasting Mixpanel as a lean event-analytics workflow with Amplitude as a broader product platform that adds experiments, surveys, and activation, with a center note that scope and pricing decide.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1b2430" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 760 39px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #171f29; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707d; }
      .tool { font: 760 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #171f29; }
      .role { font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5c6873; letter-spacing: 1.1px; }
      .copy { font: 520 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #34424d; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #65737d; }
      .mid { font: 760 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="110" class="title">Same Core Jobs, Different Scope</text>
  <text x="98" y="146" class="subtitle">Both cover funnels, retention, and cohorts. The decision is scope and pricing, not raw capability.</text>

  <rect x="96" y="204" width="448" height="332" rx="28" fill="#e9f4ff" stroke="#91bced" stroke-width="2"/>
  <circle cx="142" cy="252" r="19" fill="#6ba6df"/>
  <text x="175" y="259" class="role">LEAN EVENT ANALYTICS</text>
  <text x="128" y="312" class="tool">Mixpanel</text>
  <text x="128" y="355" class="copy">Funnels, retention, flows, and</text>
  <text x="128" y="382" class="copy">cohorts in an approachable</text>
  <text x="128" y="409" class="copy">workflow, metered by event</text>
  <text x="128" y="436" class="copy">volume. Easy to reason about.</text>
  <rect x="128" y="470" width="300" height="38" rx="19" fill="#ffffff" opacity="0.86"/>
  <text x="150" y="494" class="small">Best when: answer usage questions</text>

  <rect x="656" y="204" width="448" height="332" rx="28" fill="#edf7ee" stroke="#7dc58b" stroke-width="2"/>
  <circle cx="702" cy="252" r="19" fill="#72bd82"/>
  <text x="735" y="259" class="role">BROAD PRODUCT PLATFORM</text>
  <text x="688" y="312" class="tool">Amplitude</text>
  <text x="688" y="355" class="copy">Analytics plus experiments,</text>
  <text x="688" y="382" class="copy">surveys, and activation, with</text>
  <text x="688" y="409" class="copy">unlimited seats on every plan</text>
  <text x="688" y="436" class="copy">and a larger free event tier.</text>
  <rect x="688" y="470" width="300" height="38" rx="19" fill="#ffffff" opacity="0.86"/>
  <text x="710" y="494" class="small">Best when: grow into a platform</text>

  <line x1="544" y1="370" x2="562" y2="370" stroke="#c7ced5" stroke-width="3"/>
  <line x1="638" y1="370" x2="656" y2="370" stroke="#c7ced5" stroke-width="3"/>
  <circle cx="600" cy="370" r="41" fill="#171f29"/>
  <text x="600" y="366" class="mid" text-anchor="middle">SCOPE +</text>
  <text x="600" y="385" class="mid" text-anchor="middle">PRICING</text>

  <rect x="100" y="568" width="1000" height="1" fill="#dfe5ea"/>
  <text x="100" y="599" class="small">Many solo apps need neither yet; a lighter privacy-first tool covers the first questions. Verify current limits before committing.</text>
</svg>
