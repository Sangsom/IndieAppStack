<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Crash reporting release monitoring flow</title>
  <desc id="desc">A release monitoring workflow for a solo app launch, moving from pre-launch setup to first-week triage.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#15202b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="9" refY="3" viewBox="0 0 10 6">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f8d96"/>
    </marker>
    <style>
      .title { font: 760 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60707a; }
      .step { font: 760 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .tag { font: 740 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6c76; letter-spacing: 1px; }
      .copy { font: 520 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374550; }
      .small { font: 520 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #66737d; }
      .num { font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f6f8f7"/>
  <rect x="58" y="46" width="1084" height="583" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="96" y="110" class="title">Crash Reporting Launch Flow</text>
  <text x="98" y="146" class="subtitle">Install the tool before launch, then use every release as a small stability review.</text>

  <rect x="96" y="204" width="232" height="242" rx="26" fill="#e8f5ef" stroke="#76bd8c" stroke-width="2"/>
  <circle cx="130" cy="244" r="18" fill="#2f8f63"/>
  <text x="124" y="250" class="num">1</text>
  <text x="158" y="249" class="tag">PRE-LAUNCH</text>
  <text x="126" y="297" class="step">Install SDK</text>
  <text x="126" y="333" class="copy">Add Sentry or</text>
  <text x="126" y="357" class="copy">Crashlytics before</text>
  <text x="126" y="381" class="copy">external testers arrive.</text>
  <text x="126" y="420" class="small">Verify a test event.</text>

  <line x1="336" y1="325" x2="421" y2="325" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="432" y="204" width="232" height="242" rx="26" fill="#fff2dc" stroke="#e3b762" stroke-width="2"/>
  <circle cx="466" cy="244" r="18" fill="#bf8430"/>
  <text x="460" y="250" class="num">2</text>
  <text x="494" y="249" class="tag">RELEASE BUILD</text>
  <text x="462" y="297" class="step">Tag Releases</text>
  <text x="462" y="333" class="copy">Attach version, build,</text>
  <text x="462" y="357" class="copy">environment, and</text>
  <text x="462" y="381" class="copy">critical feature state.</text>
  <text x="462" y="420" class="small">Upload symbols or maps.</text>

  <line x1="672" y1="325" x2="757" y2="325" stroke="#7f8d96" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="768" y="204" width="232" height="242" rx="26" fill="#e9f2ff" stroke="#91b8e8" stroke-width="2"/>
  <circle cx="802" cy="244" r="18" fill="#407db9"/>
  <text x="796" y="250" class="num">3</text>
  <text x="830" y="249" class="tag">LAUNCH WEEK</text>
  <text x="798" y="297" class="step">Route Alerts</text>
  <text x="798" y="333" class="copy">Watch new issues,</text>
  <text x="798" y="357" class="copy">regressions, and</text>
  <text x="798" y="381" class="copy">user impact daily.</text>
  <text x="798" y="420" class="small">Fix trust blockers first.</text>

  <rect x="150" y="486" width="900" height="74" rx="24" fill="#f8faf9" stroke="#dbe4e8"/>
  <text x="228" y="520" class="step">Triage Rule</text>
  <text x="388" y="518" class="copy">Prioritize crashes that block onboarding, purchases,</text>
  <text x="388" y="542" class="copy">sync, exports, or a growing cluster of real users.</text>

  <rect x="100" y="592" width="1000" height="1" fill="#dde4e8"/>
  <text x="100" y="620" class="small">The goal is not a perfect dashboard. The goal is knowing whether the latest build damaged launch trust.</text>
</svg>
